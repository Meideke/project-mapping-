<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Map · TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@latest/build/spline-viewer.js"></script>
  <style>
    :root {
      --cyan: #00f0ff;
      --purple: #a259ff;
      --pink: #ff4ecd;
      --green: #00ff78;
      --amber: #ffd93d;
      --red: #ff3c5a;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

   html, body {
  height: 100%;
  width: 100%;
  margin: 0;
  overflow: hidden;
  background: transparent;
}

    /* body {
      font-family: 'Syne', sans-serif;
      background: #060a12;
      color: #eef4ff;
      cursor: none;
      user-select: none
    } */

       .task-node,
      #toolbar,
    #statusbar,
    .modal-overlay {
      pointer-events: auto;
}
    

    #cursor {
      position: fixed;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px 3px rgba(0, 240, 255, .5);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      transition: width .15s, height .15s, background .2s
    }

    #cursor.big {
      width: 38px;
      height: 38px;
      background: rgba(0, 240, 255, .1);
      box-shadow: 0 0 26px 9px rgba(0, 240, 255, .2)
    }

    #cursor.wiring {
      background: var(--pink);
      box-shadow: 0 0 14px 4px rgba(255, 78, 205, .6);
      width: 10px;
      height: 10px
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(88px);
      pointer-events: none;
      z-index: 0;
      opacity: .2;
      animation: orbFloat 11s ease-in-out infinite alternate
    }

    .orb1 {
      width: 520px;
      height: 520px;
      background: var(--purple);
      top: -130px;
      left: -100px
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: var(--cyan);
      bottom: -90px;
      right: -70px;
      animation-delay: -5s;
      animation-duration: 9s
    }

    .orb3 {
      width: 260px;
      height: 260px;
      background: var(--pink);
      top: 40%;
      left: 60%;
      animation-delay: -8s;
      animation-duration: 14s
    }

    @keyframes orbFloat {
      from {
        transform: translate(0, 0) scale(1)
      }

      to {
        transform: translate(28px, 20px) scale(1.07)
      }
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 2s) ease-in-out infinite alternate
    }

    @keyframes twinkle {
      from {
        opacity: var(--mo, .04)
      }

      to {
        opacity: .85
      }
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0, transparent 3px, rgba(0, 0, 0, .05) 3px, rgba(0, 0, 0, .05) 4px)
    }

    #toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 60px;
      background: rgba(6, 10, 18, .78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(0, 240, 255, .14);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 0 28px rgba(0, 240, 255, .06)
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 2.2s ease-in-out infinite;
      flex-shrink: 0
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 1
      }

      50% {
        transform: scale(1.35);
        opacity: .65
      }
    }

    .tb-center,
    .tb-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .gbtn {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 9px;
      cursor: pointer;
      transition: all .2s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(255, 255, 255, .05);
      color: rgba(200, 220, 255, .75)
    }

    .gbtn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 45%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, .09), transparent);
      border-radius: 9px 9px 0 0;
      pointer-events: none
    }

    .gbtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, .3)
    }

    .gbtn:active {
      transform: scale(.97)
    }

    .gbtn-cyan {
      border-color: rgba(0, 240, 255, .38);
      color: var(--cyan);
      background: rgba(0, 240, 255, .08);
      box-shadow: 0 0 14px rgba(0, 240, 255, .1)
    }

    .gbtn-cyan:hover {
      background: rgba(0, 240, 255, .16);
      border-color: var(--cyan);
      box-shadow: 0 0 28px rgba(0, 240, 255, .3)
    }
    .gbtn-red {
  display: inline-block !important;
}

    

    

    .gbtn-amber {
      border-color: rgba(255, 217, 61, .38);
      color: var(--amber);
      background: rgba(255, 217, 61, .08)
    }

    .gbtn-amber:hover {
      background: rgba(255, 217, 61, .16);
      border-color: var(--amber);
      box-shadow: 0 0 26px rgba(255, 217, 61, .3)
    }

    #canvas {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 32px;
      z-index: 10;
      overflow: hidden;
      pointer-events: auto;
    }

    #svg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2
    }

    .task-node {
      position: absolute;
      z-index: 10;
      cursor: grab;
      animation: nodeFloat var(--fd, 5s) ease-in-out infinite alternate;
      animation-delay: var(--fdel, 0s)
    }

    .task-node.dragging {
      animation: none !important;
      z-index: 100;
      cursor: grabbing
    }

    @keyframes nodeFloat {
      from {
        transform: translate(0, 0) rotate(var(--ta, -1.2deg))
      }

      to {
        transform: translate(0, var(--fy, -13px)) rotate(var(--tb, 1.3deg))
      }
    }

    .node-pill {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: rgba(255, 255, 255, .06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 14px;
      padding: 10px 14px 10px 16px;
      position: relative;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .08);
      white-space: nowrap;
      z-index: 10;
    }
    .node-pill {
    transition: 
    width 0.3s ease,
    height 0.3s ease,
    border-radius 0.3s ease,
    transform 0.25s ease;
    }
     
     @keyframes bounceMorph {
     0%   { transform: scale(1); }
     30%  { transform: scale(1.1, 0.85); }  /* squash */
     60%  { transform: scale(0.9, 1.05); }    /* stretch */
     75%  { transform: scale(1.03); }
     100% { transform: scale(1); }
     }

    .task-node.animating .node-pill {
      animation: bounceMorph 0.6s cubic-bezier(0.3, 1.4, 0.6, 1);
     }


    .node-pill::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(255, 255, 255, .07) 0%, transparent 55%);
      pointer-events: none
    }

    .task-node:hover .node-pill {
      border-color: color-mix(in srgb, var(--nc, #00f0ff) 45%, transparent);
      box-shadow: 0 0 20px color-mix(in srgb, var(--nc, #00f0ff) 20%, transparent), 0 8px 32px rgba(0, 0, 0, .5);
      transform: scale(1.04)
    }

    .task-node.done .node-pill {
      border-color: rgba(0, 255, 120, .4);
      box-shadow: 0 0 18px rgba(0, 255, 120, .18)
    }

    .node-accent {
      width: 3px;
      height: 70%;
      border-radius: 2px;
      margin-right: 10px;
      flex-shrink: 0;
      background: var(--nc, var(--cyan));
      box-shadow: 0 0 6px var(--nc, var(--cyan))
    }

    .node-text {
      font-size: .82rem;
      font-weight: 600;
      color: #eef4ff;
      flex: 1;
      min-width: 80px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .task-node.done .node-text {
      text-decoration: line-through;
      color: rgba(200, 230, 200, .45)
    }
    /* 🟢 COMPLETED GLOW */
.task-node.done .node-pill {
  border-color: rgba(0, 255, 120, 0.5);
  box-shadow:
    0 0 10px rgba(0,255,120,0.4),
    0 0 20px rgba(0,255,120,0.25),
    0 8px 32px rgba(0,0,0,0.4);
}


.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-left: 10px;
  flex-shrink: 0;
  opacity: 0.9;
}

/* 🟢 COMPLETED */
.status-dot.done {
  background: #00ff78;
  box-shadow:
    0 0 6px #00ff78,
    0 0 12px #00ff78,
    0 0 20px rgba(0,255,120,0.6);
}

/* 🟡 IN PROGRESS */
.status-dot.progress {
  background: #ffd93d;
  box-shadow:
    0 0 6px #ffd93d,
    0 0 12px #ffd93d,
    0 0 20px rgba(255,217,61,0.6);
}

/* ❌ TODO (no dot) */
.status-dot.todo {
  display: none;
}

    /* ── OUTPUT PORT: Triangle (points outward from whichever side it's on) ── */
    .node-port {
      position: absolute;
      width: 14px;
      height: 14px;

      clip-path: polygon(0% 0%, 100% 50%, 0% 100%);

      background: rgba(255, 255, 255, .25);

      cursor: crosshair;

      z-index: 1;
      /* behind content */

      transform: rotate(var(--port-rot, 0deg));

      transition: filter .18s, transform .15s;

      opacity: 0.9;
    }

    .node-port:hover {
      background: rgba(0, 240, 255, .9);
      filter: drop-shadow(0 0 7px rgba(0, 240, 255, .9)) drop-shadow(0 0 14px rgba(0, 240, 255, .5));
      transform: rotate(var(--port-rot, 0deg)) scale(1.3)
    }

    .node-port.wiring-source {
      background: var(--pink);
      filter: drop-shadow(0 0 8px rgba(255, 78, 205, .9)) drop-shadow(0 0 18px rgba(255, 78, 205, .6));
      animation: portPulse .65s ease-in-out infinite alternate
    }

    @keyframes portPulse {
      from {
        filter: drop-shadow(0 0 6px rgba(255, 78, 205, .6))
      }

      to {
        filter: drop-shadow(0 0 16px rgba(255, 78, 205, 1)) drop-shadow(0 0 28px rgba(255, 78, 205, .5))
      }
    }

    /* ── INPUT PORT: Cube (receives incoming wires) ── */
    .node-sink {
      position: absolute;
      width: 11px;
      height: 11px;

      border-radius: 3px;

      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .25);

      cursor: crosshair;

      z-index: 1;

      transition: all .15s;

      opacity: 0.9;
    }

    .node-sink:hover {
      background: rgba(0, 240, 255, .3);
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 240, 255, .7), 0 0 20px rgba(0, 240, 255, .3);
      transform: scale(1.35)
    }

    .node-sink.wire-landing {
      background: rgba(255, 78, 205, .35);
      border-color: var(--pink);
      box-shadow: 0 0 12px rgba(255, 78, 205, .8), 0 0 22px rgba(255, 78, 205, .4);
      animation: sinkPulse .65s ease-in-out infinite alternate
    }

    @keyframes sinkPulse {
      from {
        box-shadow: 0 0 8px rgba(255, 78, 205, .5), 0 0 16px rgba(255, 78, 205, .3)
      }

      to {
        box-shadow: 0 0 18px rgba(255, 78, 205, 1), 0 0 32px rgba(255, 78, 205, .5)
      }
    }

    .task-node.wire-target .node-pill {
      border-color: var(--pink);
      box-shadow: 0 0 24px rgba(255, 78, 205, .35)
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(8px);
      z-index: 500;
      align-items: center;
      justify-content: center
    }

    .modal-overlay.open {
      display: flex
    }

    .modal-box {
      background: rgba(10, 16, 28, .92);
      backdrop-filter: blur(30px) saturate(1.3);
      -webkit-backdrop-filter: blur(30px) saturate(1.3);
      border: 1px solid rgba(0, 240, 255, .2);
      border-radius: 16px;
      padding: 28px;
      width: 400px;
      max-width: 92vw;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .65), 0 0 60px rgba(0, 240, 255, .07);
      position: relative
    }

    .modal-box::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, .05) 0%, transparent 50%);
      pointer-events: none
    }

    .modal-box h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 18px;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .mrow {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 14px
    }

    .mrow label {
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(200, 220, 255, .4)
    }

    .minput,
    .mselect {
      font-family: 'DM Mono', monospace;
      font-size: .76rem;
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      color: #eef4ff;
      outline: none;
      transition: all .18s;
      width: 100%
    }

    .minput:focus,
    .mselect:focus {
      border-color: rgba(0, 240, 255, .42);
      background: rgba(0, 240, 255, .05);
      box-shadow: 0 0 12px rgba(0, 240, 255, .1)
    }

    .minput::placeholder {
      color: rgba(180, 200, 240, .28)
    }

    .mselect option {
      background: #0e1421
    }

    .color-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .cpick {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .15s
    }

    .cpick:hover,
    .cpick.selected {
      border-color: rgba(255, 255, 255, .6);
      transform: scale(1.2);
      box-shadow: 0 0 10px currentColor
    }

    .mactions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, .07)
    }

    #statusbar {
      position:fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 32px;
      background: rgba(6, 10, 18, .82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0, 240, 255, .09);
      display: flex;
      align-items: center;

      padding: 0 20px;
      gap: 20px;
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      letter-spacing: .06em;
      color: rgba(200, 220, 255, .3)
    }

    #statusbar b {
      color: var(--cyan);
      font-weight: 500
    }

    .hint-badge {
      position: fixed;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: .6rem;
      letter-spacing: .1em;
      color: rgba(200, 220, 255, .22);
      background: rgba(6, 10, 18, .7);
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: 20px;
      padding: 4px 14px;
      z-index: 50;
      pointer-events: none;
      animation: hintPulse 3s ease-in-out infinite
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: .7
      }

      50% {
        opacity: .3
      }
    }

    #preview-line {
      stroke: var(--pink);
      stroke-width: 2;
      stroke-dasharray: 6 4;
      opacity: .7
    }

    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 400;
      mix-blend-mode: screen
    }
    #status-menu {
  position: fixed;
  background: rgba(10, 16, 28, 0.92);
  backdrop-filter: blur(20px) saturate(1.2);
  -webkit-backdrop-filter: blur(20px);

  border: 1px solid rgba(0, 240, 255, 0.2);
  border-radius: 10px;

  padding: 6px;
  display: none;
  z-index: 1000;

  font-family: 'DM Mono', monospace;
  font-size: 11px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    0 0 20px rgba(0,240,255,0.08);
}

.status-item {
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 6px;
}

.status-item:hover {
  background: rgba(0, 240, 255, 0.12);
}
/* circle task cube  */
.task-node.collapsed .node-pill {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  justify-content: center;
  padding: 0;
}

.task-node.collapsed .node-text {
  display: none;
}

.task-node.collapsed .node-accent {
  display: none;
}

.task-node.collapsed .status-dot {
  display: none;
}

.task-node.collapsed .node-pill::after {
  content: attr(data-letter);
  font-size: 18px;
  font-weight: bold;
  color: white;
}

.task-node.collapsed .node-port,
.task-node.collapsed .node-sink {
  display: none;
} 
/* selction for deletion of a node  */
.task-node.selected .node-pill {
  border-color: #ff3c5a;
  box-shadow: 
    0 0 10px rgba(255,60,90,0.6),
    0 0 25px rgba(255,60,90,0.3);
}

.conn-el {
  filter:
    drop-shadow(0 0 4px currentColor)
    drop-shadow(0 0 10px currentColor);
    
}
.color-row {
  display: flex;
  gap: 6px;
  padding: 6px;
}

.c-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: 0.2s;
}

.c-dot:hover {
  transform: scale(1.2);
  box-shadow: 0 0 8px currentColor;
  border-color: white;
}
#bg-video{
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  pointer-events: none;
}
 


  </style>
</head>

   <div class="color-row">
    <div class="c-dot" data-color="#00f0ff" style="background:#00f0ff"></div>

      <button class="gbtn gbtn-amber" onclick="window.location.href='tasksite.html'">&#8592; Homepage</button>

  </div>

  <div id="canvas">
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
      <defs>
    
        
      </defs>
      <line id="preview-line" x1="0" y1="0" x2="0" y2="0" style="display:none" />
    </svg>
  </div>

  <div id="statusbar">
    <span>NODES <b id="sb-nodes">0</b></span>
    <span>WIRES <b id="sb-conns">0</b></span>
    <span>DONE <b id="sb-done">0</b></span>
    <span style="margin-left:auto">&#9655; triangle = output &middot; &#9632; cube = input &middot; Drag both along any
      border &middot; Click triangle to wire</span>
  </div>

  <div class="hint-badge" id="hint">Click "+ Add Task" to place your first node</div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <h2>Add task node</h2>
      <div class="mrow">
        <label>Task title</label>
        <input class="minput" id="m-title" placeholder="e.g. Design wireframes…" maxlength="60">
      </div>
      <div class="mrow">
        <label>Status</label>
        <select class="mselect" id="m-status">
          <option value="todo">To Do</option>
          <option value="progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="mrow">
        <label>Color</label>
        <div class="color-picker" id="color-picker">
          <div class="cpick selected" data-color="#00f0ff" style="background:#00f0ff;color:#00f0ff"></div>
           <div class="cpick" data-color="#ff9f1c" style="background:#ff9f1c"></div> <!-- orange -->
           <div class="cpick" data-color="#8aff00" style="background:#8aff00"></div> <!-- lime -->
           <div class="cpick" data-color="#ff6b6b" style="background:#ff6b6b"></div> <!-- soft red -->
           <div class="cpick" data-color="#00ffe1" style="background:#00ffe1"></div> <!-- aqua -->
           <div class="cpick" data-color="#c77dff" style="background:#c77dff"></div> <!-- lavender -->
        </div>
      </div>
      <div class="mactions">
        <button class="gbtn" onclick="closeModal()">Cancel</button>
        <button class="gbtn gbtn-cyan" onclick="saveNode()">Add to canvas</button>
        
      </div>
    </div>
  </div>
  <div id="unlink-popup" style="position:fixed; background:rgba(10,16,28,.95); border:1px solid rgba(0,240,255,.3);
    border-radius:10px; padding:10px; min-width:180px; display:none; z-index:999; backdrop-filter:blur(10px);
    font-family:'DM Mono',monospace; font-size:11px;color: #eef4ff; ">
</div>

  <script>
    const TOP_BOUNDARY = 10; // little extra spacing (60px toolbar + padding)

     let selectedNodes = new Set();

    let dragMoved = false;
    let dragStartX = 0;
    let dragStartY = 0;
    const DRAG_THRESHOLD = 5; // pixels        
    // separate dat save 
    function saveToStorage() {
  localStorage.setItem("nodes_" + currentProject, JSON.stringify(nodes));
  localStorage.setItem("connections_" + currentProject, JSON.stringify(connections));
}

function loadFromStorage() {
  const n = localStorage.getItem("nodes_" + currentProject);
  const c = localStorage.getItem("connections_" + currentProject);

  nodes = n ? JSON.parse(n) : [];
  connections = c ? JSON.parse(c) : [];
}
    const currentProject = localStorage.getItem("currentProject") || "Default Project";
    // right click window 
    function showStatusMenu(nodeId, x, y) {
  const menu = document.getElementById('status-menu');

  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.style.display = 'block';

  menu.dataset.nodeId = nodeId;
}
    // ── Cursor ──────────────────────────────────────────────────────────────────
    const cur = document.getElementById('cursor');
    let cx = innerWidth / 2, cy = innerHeight / 2, mx = cx, my = cy;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function tick() {
      cx += (mx - cx) * 0.18;
      cy += (my - cy) * 0.18;
      cur.style.left = cx + 'px';
      cur.style.top = cy + 'px';
      requestAnimationFrame(tick);
    })();

    // ── Stars ────────────────────────────────────────────────────────────────────
    // const starsEl = document.getElementById('stars');
    // for (let i = 0; i < 120; i++) {
    //   const s = document.createElement('div');
    //   s.className = 'star';
    //   const sz = Math.random() * 2 + 0.4;
    //   Object.assign(s.style, {
    //     width: sz + 'px', height: sz + 'px',
    //     left: Math.random() * 100 + '%',
    //     top: Math.random() * 100 + '%',
    //     '--d': (Math.random() * 3 + 1.2).toFixed(2) + 's',
    //     '--mo': (Math.random() * 0.1 + 0.03).toFixed(2),
    //     animationDelay: (Math.random() * 4).toFixed(2) + 's'
    //   });
    //   starsEl.appendChild(s);
    // }

    // ── Core state ───────────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const svgEl = document.getElementById('svg-layer');
    const prevLine = document.getElementById('preview-line');

    let nodes = []; // {id,x,y,title,status,color, portSide,portOffset, sinkSide,sinkOffset}
    let connections = []; // {id,fromId,toId}
    let wiringFrom = null;
    let editingId = null;
    let selectedColor = '#00f0ff';

    function uid() { return Math.random().toString(36).slice(2, 10); }
    loadFromStorage();
    renderAll();

    // ── Color picker ─────────────────────────────────────────────────────────────
    document.querySelectorAll('.cpick').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.cpick').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedColor = el.dataset.color;
      });
    });

    // ── Modal ─────────────────────────────────────────────────────────────────────
    function openModal(editId) {
      editId = editId || null;
      editingId = editId;
      const nd = editId ? nodes.find(n => n.id === editId) : null;
      document.getElementById('m-title').value = nd ? nd.title : '';
      document.getElementById('m-status').value = nd ? nd.status : 'todo';
      selectedColor = nd ? nd.color : '#00f0ff';
      document.querySelectorAll('.cpick').forEach(c => {
        c.classList.toggle('selected', c.dataset.color === selectedColor);
      });
      document.getElementById('modal').classList.add('open');
      setTimeout(() => document.getElementById('m-title').focus(), 60);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editingId = null;
    }

    document.getElementById('modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); cancelWiring(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' &&
        document.getElementById('modal').classList.contains('open')) saveNode();
    });

    // ── Save / edit node ──────────────────────────────────────────────────────────
    function saveNode() {
      const title = document.getElementById('m-title').value.trim();
      if (!title) { document.getElementById('m-title').focus(); return; }
      const status = document.getElementById('m-status').value;

      if (editingId) {
        const nd = nodes.find(n => n.id === editingId);
        if (nd) { nd.title = title; nd.status = status; nd.color = selectedColor; }
        closeModal();
        renderAll();
        saveToStorage();
        return;
      }

      const cw = window.innerWidth;
      const ch = window.innerHeight;
      const margin = 80;
      const x = margin + Math.random() * (cw - 320 - margin);
      const y = margin + Math.random() * (ch - 100 - margin);

      nodes.push({
        id: uid(), x, y, title, status, color: selectedColor,
        portSide: 'right', portOffset: 0.5,   // output triangle
        sinkSide: 'left', sinkOffset: 0.5 ,   // input cube
        collapsed: false
      });

      closeModal();
      renderAll();
      saveToStorage();
      document.getElementById('hint').style.display = 'none';
      burst({ clientX: x + 120, clientY: y + 30 });
    }

    // ── Render all ────────────────────────────────────────────────────────────────
    function renderAll() {
      renderNodes();
      renderConnections();
      updateStats();
    }

    // ── Render nodes ──────────────────────────────────────────────────────────────
    function renderNodes() {
      document.querySelectorAll('.task-node').forEach(el => el.remove());

      nodes.forEach(nd => {
        const el = document.createElement('div');
        el.className = 'task-node';

            if (nd.collapsed) {
           el.classList.add('collapsed');
           }
            el.addEventListener('click', (e) => {
          if (e.target.closest('.node-port') || e.target.closest('.node-sink')) return;
          if (dragMoved) return;

          // 🔹 Toggle selection with CTRL key
          if (e.ctrlKey || e.metaKey) {
            if (selectedNodes.has(nd.id)) {
              selectedNodes.delete(nd.id);
              el.classList.remove('selected');
            } else {
              selectedNodes.add(nd.id);
              el.classList.add('selected');
            }
            return;
          }
        
          // 🔹 Normal click = collapse/expand
          nd.collapsed = !nd.collapsed;

          renderAll();
          saveToStorage();

          setTimeout(() => {
            const newEl = document.getElementById('node-' + nd.id);
            if (newEl) {
              newEl.classList.add('animating');
              setTimeout(() => newEl.classList.remove('animating'), 600);
            }        
          }, 0);
        });

         if (selectedNodes.has(nd.id)) {
         el.classList.add('selected');
         } 
        //  done button 
        if (nd.status === 'done') {
          el.classList.add('done');
          } else if (nd.status === 'progress') {
              el.classList.add('progress');
             }
        el.id = 'node-' + nd.id;
        el.style.left = nd.x + 'px';
        el.style.top = nd.y + 'px';
        el.style.setProperty('--nc', nd.color || '#00f0ff');
        el.style.setProperty('--fd', (3.8 + Math.random() * 2.5).toFixed(2) + 's');
        el.style.setProperty('--fdel', (Math.random() * 2).toFixed(2) + 's');
        el.style.setProperty('--fy', -(8 + Math.random() * 12).toFixed(1) + 'px');
        el.style.setProperty('--ta', (Math.random() * 2.4 - 1.2).toFixed(1) + 'deg');
        el.style.setProperty('--tb', (Math.random() * 2.4 - 1.2).toFixed(1) + 'deg');
        

        el.innerHTML = `
          <div class="node-pill" data-letter="${nd.title.charAt(0).toUpperCase()}">
          <div class="node-accent" style="--nc:${nd.color}"></div>
          <span class="node-text">${nd.title}</span>
          <div class="status-dot ${nd.status}"></div>
          <div class="node-port" id="port-${nd.id}"></div>
          <div class="node-sink" id="sink-${nd.id}"></div>
          </div>`;

        canvas.appendChild(el);
        makeDraggable(el, nd);

        // Position both ports after DOM is ready
        setTimeout(() => {
          positionPort(el, nd);
          positionSink(el, nd);
        }, 0);

        // ── Triangle port: drag to reposition, click to start wire ──
        const port = el.querySelector('.node-port');
        port.addEventListener('mousedown', e => {
          e.stopPropagation();
          let moved = false;

          const onMove = ev => {
            moved = true;
            snapPortToEdge(ev, el, nd, 'port');
            positionPort(el, nd);
          };

          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            if (!moved) startWiring(nd.id);
          };

          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        // ── Cube sink: drag to reposition ──
        // existing drag code
        const sink = el.querySelector('.node-sink');

        sink.addEventListener('mousedown', e => {
          e.stopPropagation();

          const onMove = ev => {
            snapPortToEdge(ev, el, nd, 'sink');
            positionSink(el, nd);
          };

          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };

          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        // ⭐ ADD THIS BELOW
        sink.addEventListener('click', e => {
          e.stopPropagation();

          showUnlinkPopup(nd.id, e.clientX, e.clientY);
        });
        el.addEventListener('contextmenu', e => {
        e.preventDefault();
         showStatusMenu(nd.id, e.clientX, e.clientY);
        });
      });
    }

    // ── Snap a port to the nearest edge ──────────────────────────────────────────
    function snapPortToEdge(ev, el, nd, which) {
      const rect = el.getBoundingClientRect();
      const x = ev.clientX - rect.left;
      const y = ev.clientY - rect.top;
      const w = rect.width, h = rect.height;

      const dist = { top: y, bottom: h - y, left: x, right: w - x };
      const side = Object.keys(dist).reduce((a, b) => dist[a]
        < dist[b] ? a : b); const offset = (side === 'top' || side === 'bottom') ? Math.max(0, Math.min(1, x / w)) : Math.max(0,
          Math.min(1, y / h)); if (which === 'port') { nd.portSide = side; nd.portOffset = offset; } else {
            nd.sinkSide = side;
            nd.sinkOffset = offset;
          }
    } 
    // ── Position triangle port ────────────────────────────────────
  function positionPort(el, nd) {
  const port = el.querySelector('.node-port');
  if (!port) return;

  const w = el.offsetWidth;
  const h = el.offsetHeight;

  const rotMap = {
    right: '0deg',
    bottom: '90deg',
    left: '180deg',
    top: '270deg'
  };

  port.style.setProperty('--port-rot', rotMap[nd.portSide] || '0deg');

  if (nd.portSide === 'right') {
    port.style.left = (w - 2) + 'px';
    port.style.top = (h * nd.portOffset - 7) + 'px';
  }
  else if (nd.portSide === 'left') {
    port.style.left = '-12px';
    port.style.top = (h * nd.portOffset - 7) + 'px';
  }
  else if (nd.portSide === 'top') {
    port.style.top = '-12px';
    port.style.left = (w * nd.portOffset - 7) + 'px';
  }
  else if (nd.portSide === 'bottom') {
    port.style.top = (h - 2) + 'px';
    port.style.left = (w * nd.portOffset - 7) + 'px';
  }
}  
// ── Position cube sink ────────────────────────────────────────
function positionSink(el, nd) {
  const sink = el.querySelector('.node-sink');
  if (!sink) return;

  const w = el.offsetWidth;
  const h = el.offsetHeight;

  if (nd.sinkSide === 'right') {
    sink.style.left = (w - 2) + 'px';
    sink.style.top = (h * nd.sinkOffset - 5) + 'px';
  }
  else if (nd.sinkSide === 'left') {
    sink.style.left = '-10px';
    sink.style.top = (h * nd.sinkOffset - 5) + 'px';
  }
  else if (nd.sinkSide === 'top') {
    sink.style.top = '-10px';
    sink.style.left = (w * nd.sinkOffset - 5) + 'px';
  }
  else if (nd.sinkSide === 'bottom') {
    sink.style.top = (h - 2) + 'px';
    sink.style.left = (w * nd.sinkOffset - 5) + 'px';
  }
}

    // ── Drag node ─────────────────────────────────────────────────────────────────
    function makeDraggable(el, nd) {
      let dragging = false, ox = 0, oy = 0;

       function start(x, y) {
       dragging = true;
       dragMoved = false;
       dragStartX = x;
       dragStartY = y;

       ox = x - nd.x;
       oy = y - nd.y;
       el.classList.add('dragging');
       }     

         
        function move(x, y) {
        if (!dragging) return;

        // 👇 detect movement
        if (Math.abs(x - dragStartX) > DRAG_THRESHOLD || 
            Math.abs(y - dragStartY) > DRAG_THRESHOLD) {
          dragMoved = true;
        }

        const cw = canvas.offsetWidth, ch = canvas.offsetHeight;

        const nodeWidth = el.offsetWidth;
        nd.x = Math.max(0, Math.min(cw - nodeWidth, x - ox));

        const nodeHeight = el.offsetHeight;
        nd.y = Math.max(TOP_BOUNDARY, Math.min(ch - nodeHeight, y - oy));

        el.style.left = nd.x + 'px';
        el.style.top = nd.y + 'px';
      }

      function stop() {
        dragging = false;
        el.classList.remove('dragging');
      }

      // 🖱️ MOUSE
      el.addEventListener('mousedown', e => {
        if (e.target.closest('.node-port') || e.target.closest('.node-sink')) return;
        start(e.clientX, e.clientY);
      });

      document.addEventListener('mousemove', e => move(e.clientX, e.clientY));
      document.addEventListener('mouseup', stop);

      // 📱 TOUCH (NEW)
      el.addEventListener('touchstart', e => {
        const t = e.touches[0];
        if (e.target.closest('.node-port') || e.target.closest('.node-sink')) return;
        start(t.clientX, t.clientY);
      });

      document.addEventListener('touchmove', e => {
        const t = e.touches[0];
        move(t.clientX, t.clientY);
      }, { passive: false });

      document.addEventListener('touchend', stop);
    }

    // ── Wiring ────────────────────────────────────────────────────────────────────
    function startWiring(fromId) {
      cancelWiring();
      wiringFrom = fromId;
      cur.classList.add('wiring');
      document.getElementById('wiring-label').style.display = 'block';
      const p = document.getElementById('port-' + fromId);
      if (p) p.classList.add('wiring-source');
      prevLine.style.display = 'block';
    }

    function finishWiring(toId) {
      if (!wiringFrom || wiringFrom === toId) { cancelWiring(); return; }
      const exists = connections.some(c => c.fromId === wiringFrom && c.toId === toId);
      if (!exists) {
        connections.push({ id: uid(), fromId: wiringFrom, toId });
        burst({ clientX: mx, clientY: my });
      }
      cancelWiring();
      renderConnections();
      updateStats();
    }

    function cancelWiring() {
      if (wiringFrom) {
        const p = document.getElementById('port-' + wiringFrom);
        if (p) p.classList.remove('wiring-source');
      }
      wiringFrom = null;
      cur.classList.remove('wiring');
      document.getElementById('wiring-label').style.display = 'none';
      prevLine.style.display = 'none';
      document.querySelectorAll('.task-node').forEach(el => el.classList.remove('wire-target'));
      document.querySelectorAll('.node-sink').forEach(el => el.classList.remove('wire-landing'));
    }

    // ── Preview line tracks mouse while wiring ────────────────────────────────────
    canvas.addEventListener('mousemove', e => {
      if (!wiringFrom) return;
      const p = getPortCenter(wiringFrom);
      if (!p) return;
      const cr = canvas.getBoundingClientRect();
      prevLine.setAttribute('x1', p.x); prevLine.setAttribute('y1', p.y);
      prevLine.setAttribute('x2', e.clientX - cr.left);
      prevLine.setAttribute('y2', e.clientY - cr.top);

      document.querySelectorAll('.task-node').forEach(el => {
        el.classList.remove('wire-target');
        const s = el.querySelector('.node-sink');
        if (s) s.classList.remove('wire-landing');
      });
      const hovered = e.target.closest('.task-node');
      if (hovered && hovered.id !== 'node-' + wiringFrom) {
        hovered.classList.add('wire-target');
        const s = hovered.querySelector('.node-sink');
        if (s) s.classList.add('wire-landing');
      }
    });

    canvas.addEventListener('mousedown', e => {
      if (!wiringFrom) return;
      const nodeEl = e.target.closest('.task-node');
      if (nodeEl) {
        const nid = nodeEl.id.replace('node-', '');
        if (nid !== wiringFrom) finishWiring(nid);
        return;
      }
      cancelWiring();
    });

    canvas.addEventListener('mouseleave', () => { prevLine.style.display = 'none'; });
    canvas.addEventListener('mouseenter', () => { if (wiringFrom) prevLine.style.display = 'block'; });

    // ── Get live center of output port (triangle) ─────────────────────────────────
    function getPortCenter(nodeId) {
      const el = document.getElementById('node-' + nodeId);
      const nd = nodes.find(n => n.id === nodeId);
      if (!el || !nd) return null;
      const rect = el.getBoundingClientRect();
      const cr = canvas.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      if (nd.portSide === 'right') return { x: rect.right - cr.left, y: rect.top - cr.top + h * nd.portOffset };
      if (nd.portSide === 'left') return { x: rect.left - cr.left, y: rect.top - cr.top + h * nd.portOffset };
      if (nd.portSide === 'top') return { x: rect.left - cr.left + w * nd.portOffset, y: rect.top - cr.top };
      if (nd.portSide === 'bottom') return { x: rect.left - cr.left + w * nd.portOffset, y: rect.bottom - cr.top };
      return null;
    }

    // ── Get live center of input port (cube) ──────────────────────────────────────
    function getSinkCenter(nodeId) {
      const el = document.getElementById('node-' + nodeId);
      const nd = nodes.find(n => n.id === nodeId);
      if (!el || !nd) return null;
      const rect = el.getBoundingClientRect();
      const cr = canvas.getBoundingClientRect();
      const w = rect.width, h = rect.height;
      if (nd.sinkSide === 'right') return { x: rect.right - cr.left, y: rect.top - cr.top + h * nd.sinkOffset };
      if (nd.sinkSide === 'left') return { x: rect.left - cr.left, y: rect.top - cr.top + h * nd.sinkOffset };
      if (nd.sinkSide === 'top') return { x: rect.left - cr.left + w * nd.sinkOffset, y: rect.top - cr.top };
      if (nd.sinkSide === 'bottom') return { x: rect.left - cr.left + w * nd.sinkOffset, y: rect.bottom - cr.top };
      return null;
    }

    // ── Render wires (no arrowheads) ──────────────────────────────────────────────
    function renderConnections() {
      document.querySelectorAll('#svg-layer .conn-el').forEach(el => el.remove());

      connections.forEach(conn => {

        const fromNd = nodes.find(n => n.id === conn.fromId);
        const toNd = nodes.find(n => n.id === conn.toId);
        if (!fromNd || !toNd) return;

        const p1 = getPortCenter(conn.fromId);
        const p2 = getSinkCenter(conn.toId);
        if (!p1 || !p2) return;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

        path.setAttribute('class', 'conn-el');

        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const dist = Math.hypot(dx, dy);

        // 🟢 VERY CLOSE → STRAIGHT
if (dist < 80) {
  path.setAttribute('d', `M${p1.x},${p1.y} L${p2.x},${p2.y}`);
}

// 🟡 MEDIUM → RIGHT ANGLE
else if (dist < 250) {
  const midX = (p1.x + p2.x) / 2;

  path.setAttribute('d',
    `M${p1.x},${p1.y}
     L${midX},${p1.y}
     L${midX},${p2.y}
     L${p2.x},${p2.y}`
  );
}

// 🔵 FAR → SMART CURVE (FIXED DIRECTION)
else {
  const bend = Math.max(Math.abs(dx) * 0.5, 80);
  const dir = dx >= 0 ? 1 : -1;

  const cx1 = p1.x + bend * dir;
  const cy1 = p1.y;

  const cx2 = p2.x - bend * dir;
  const cy2 = p2.y;

  path.setAttribute('d',
    `M${p1.x},${p1.y} C${cx1},${cy1} ${cx2},${cy2} ${p2.x},${p2.y}`
  );
}
    

    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', fromNd.color || '#00f0ff');
    path.style.color = fromNd.color || '#00f0ff';
    path.setAttribute('stroke-width', '2.3');
    path.setAttribute('vector-effect', 'non-scaling-stroke');
    path.setAttribute('stroke-opacity', '1');
    path.setAttribute('stroke-linecap', 'round');
    

    path.style.pointerEvents = 'stroke';

    path.addEventListener('click', () => {
      connections = connections.filter(c => c.id !== conn.id);
      renderAll();
    });

    svgEl.insertBefore(path, prevLine); // ✅ ONLY ONE

    });
    }
    // unlink button
    function showUnlinkPopup(nodeId, x, y) {
      const popup = document.getElementById('unlink-popup');

      // get all incoming connections
      const incoming = connections.filter(c => c.toId === nodeId);

      if (incoming.length === 0) {
        popup.style.display = 'none';
        return;
      }

      popup.innerHTML = '';

      incoming.forEach(conn => {
        const fromNode = nodes.find(n => n.id === conn.fromId);

        const item = document.createElement('div');
        item.textContent = `← ${fromNode.title}`;
        item.style.padding = '6px';
        item.style.cursor = 'pointer';
        item.style.borderRadius = '6px';

        item.onmouseenter = () => item.style.background = 'rgba(0,240,255,.15)';
        item.onmouseleave = () => item.style.background = 'transparent';

        item.onclick = () => {
          connections = connections.filter(c => c.id !== conn.id);
          popup.style.display = 'none';
          renderConnections();
          updateStats();
        };

        popup.appendChild(item);
      });

      popup.style.left = x + 'px';
      popup.style.top = y + 'px';
      popup.style.display = 'block';
    }

    // ── Toggle done ───────────────────────────────────────────────────────────────
    function toggleDone(id, e) {
      e.stopPropagation();
      const nd = nodes.find(n => n.id === id);
      if (!nd) return;
      nd.status = nd.status === 'done' ? 'todo' : 'done';
      renderAll();
    }

    // ── Delete node ───────────────────────────────────────────────────────────────
    function deleteNode(id, e) {
      e.stopPropagation();
      if (wiringFrom === id) cancelWiring();
      nodes = nodes.filter(n => n.id !== id);
      connections = connections.filter(c => c.fromId !== id && c.toId !== id);
      document.getElementById('node-' + id)?.remove();
      renderConnections();
      updateStats();
      saveToStorage();
      if (!nodes.length) document.getElementById('hint').style.display = 'block';
    }

    // deletion of selected node 
    function deleteSelected() {
     if (!selectedNodes.size) return;

     // remove selected nodes
     nodes = nodes.filter(n => !selectedNodes.has(n.id));

     // remove related connections
     connections = connections.filter(c => 
       !selectedNodes.has(c.fromId) && !selectedNodes.has(c.toId)
     );

     selectedNodes.clear();

     renderAll();
     saveToStorage();
   }   

   

    // ── Stats ─────────────────────────────────────────────────────────────────────
    function updateStats() {
      document.getElementById('sb-nodes').textContent = nodes.length;
      document.getElementById('sb-conns').textContent = connections.length;
      document.getElementById('sb-done').textContent = nodes.filter(n => n.status === 'done').length;
    }

    // ── Particle burst ────────────────────────────────────────────────────────────
    const PCOLS = ['#00f0ff', '#a259ff', '#ff4ecd', '#00ff78', '#ffd93d'];
    function burst(e) {
      const ox = e.clientX, oy = e.clientY;
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div'); p.className = 'particle'; const
          sz = Math.random() * 6 + 3; const col = PCOLS[Math.floor(Math.random() * PCOLS.length)]; const angle = (Math.PI * 2 /
            12) * i + Math.random() * 0.5; const spd = Math.random() * 80 + 40; Object.assign(p.style, {
              width: sz + 'px',
              height: sz + 'px', background: col, boxShadow: `0 0 ${sz * 2}px ${col}`, left: ox + 'px', top: oy + 'px'
            });
        document.body.appendChild(p); const vx = Math.cos(angle) * spd, vy = Math.sin(angle) * spd; const
          t0 = performance.now(), dur = (Math.random() * 0.4 + 0.5) * 1000; (function animP(now) {
            const prog = (now - t0) / dur;
            if (prog >= 1) { p.remove(); return; }
            const ease = 1 - prog * prog;
            p.style.left = (ox + vx * prog) + 'px';
            p.style.top = (oy + vy * prog + 50 * prog * prog) + 'px';
            p.style.opacity = ease;
            p.style.transform = `scale(${ease})`;
            requestAnimationFrame(animP);
          })(performance.now());
      }
    };
    document.getElementById("project-title").innerText = currentProject;
    // separate save 

    // ── Cursor hover enlargement ──────────────────────────────────────────────────
    document.addEventListener('mouseover', e => {
      if (e.target.closest('.gbtn,.cpick,.task-node')) cur.classList.add('big');
      else cur.classList.remove('big');
    });

    // unlink button pop-up
    document.addEventListener('click', () => {
      document.getElementById('unlink-popup').style.display = 'none';
    });

    // ── RAF loop: redraw wires every frame so they follow the floating animation ──
    function animateWires() {
      renderConnections();
      requestAnimationFrame(animateWires);
    };
    // status window 
    document.querySelectorAll('-item').forEach(item => {
  item.addEventListener('click', () => {
    const menu = document.getElementById('status-menu');
    const nodeId = menu.dataset.nodeId;
    const status = item.dataset.status;

    const nd = nodes.find(n => n.id === nodeId);
    if (!nd) return;

    nd.status = status;

    menu.style.display = 'none';
    renderAll();
    saveToStorage();
   });
   });
  // 🎨 COLOR CHANGE FROM RIGHT CLICK MENU
document.addEventListener('click', (e) => {
  if (!e.target.classList.contains('c-dot')) return;

  const menu = document.getElementById('status-menu');
  const nodeId = menu.dataset.nodeId;
  const color = e.target.dataset.color;

  const nd = nodes.find(n => n.id === nodeId);

  nd.color = color;

  menu.style.display = 'none';
  renderAll();

});

  document.getElementById('status-menu').style.display = 'none';
  });

  
    animateWires();
